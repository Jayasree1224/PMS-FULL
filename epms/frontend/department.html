<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Details - Placement Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">
            <div class="logo-circle">PMS</div>
            <span>Placement Management System</span>
        </div>
        <div class="navbar-right">
            <div class="user-info">
                <div class="user-name" id="navUserName">-</div>
                <div class="user-role"><span class="role-badge" id="navUserRole">-</span></div>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="Auth.logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="breadcrumb"><a href="dashboard.html">← Back to Dashboard</a></div>

        <h1 class="page-title" id="deptTitle">Department</h1>
        <p class="page-subtitle" id="deptSubtitle">Student placement details</p>

        <div class="toolbar">
            <input type="text" id="searchInput" class="search-input" placeholder="Search by name, company, or email...">
            <button class="btn btn-primary" id="addStudentBtn" onclick="openAddModal()">+ Add Student</button>
        </div>

        <div id="alertBox"></div>

        <div id="studentGrid" class="student-grid">
            <div class="loading">Loading students...</div>
        </div>
    </div>

    <!-- Add/Edit Student Modal -->
    <div class="modal-overlay hidden" id="studentModal">
        <div class="modal-box">
            <h2 id="modalTitle">Add Student</h2>
            <div id="modalAlert"></div>
            <form id="studentForm">
                <input type="hidden" id="studentId">

                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label for="rollNumber">Roll Number</label>
                        <input type="text" id="rollNumber">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="department">Department *</label>
                        <select id="department" required>
                            <option value="CSE">CSE</option>
                            <option value="IT">IT</option>
                            <option value="ECE">ECE</option>
                            <option value="MECH">MECH</option>
                            <option value="CIVIL">CIVIL</option>
                            <option value="AIDS">AIDS</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="batch">Batch *</label>
                        <input type="text" id="batch" placeholder="e.g. 2021-2025" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group form-group-full">
                        <label for="email">Email *</label>
                        <input type="email" id="email" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phoneNumber">Phone Number</label>
                        <input type="text" id="phoneNumber">
                    </div>
                    <div class="form-group">
                        <label for="photoFile">Student Photo</label>
                        <input type="file" id="photoFile" accept="image/*">
                    </div>
                </div>

                <div class="form-group checkbox-row">
                    <input type="checkbox" id="placed" onchange="togglePlacementFields()">
                    <label for="placed" style="margin-bottom:0;">Mark as Placed</label>
                </div>

                <div id="placementFields">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="companyName">Company Name</label>
                            <input type="text" id="companyName">
                        </div>
                        <div class="form-group">
                            <label for="offerType">Offer Type</label>
                            <input type="text" id="offerType" placeholder="e.g. Full Time">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="packageLpa">Package (LPA)</label>
                            <input type="number" id="packageLpa" step="0.1" min="0">
                        </div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/department.js"></script>
</body>
</html>
